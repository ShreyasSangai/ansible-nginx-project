[defaults]
# Dynamic inventory use karenge
inventory           = /home/ec2-user/ansible-nginx-project/ansible/inventory/aws_ec2.yml
remote_user         = ec2-user
private_key_file    = /home/ec2-user/ansible-nginx-key.pem
host_key_checking   = False
retry_files_enabled = False

# Output better dikhega
stdout_callback     = yaml
deprecation_warnings = False

[inventory]
enable_plugins = aws_ec2